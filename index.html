<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap"
    rel="stylesheet">
  <title>Digital Library</title>
</head>

<body>

  <header class="hero">
    <h1>The Grand Library</h1>
    <p>Discover your next great adventure</p>
  </header>

  <main>

    <section id="controls">
      <!--Group for genre-buttons-->
      <div class="filter-group">
        <button class="filter-btn" data-genre="All">All Genres</button>
        <button class="filter-btn" data-genre="Fantasy">Fantasy</button>
        <button class="filter-btn" data-genre="Dystopian">Dystopian</button>
        <button class="filter-btn" data-genre="Science Fiction">Sci-Fi</button>
        <button class="filter-btn" data-genre="Mystery">Mystery</button>
      </div>
      <div class="search-wrapper">
        <input type="text" id="searchInput" placeholder="Search by title or author..." />
        <span class="search-icon">🔍</span>
      </div>

      <!--Group for sort and special functions-->
      <div class="sort-group">
        <label for="sortSelector">Sort by:</label>
        <select id="sortSelector">
          <option value="none">Default</option>
          <option value="ratingHigh">Rating: High to Low</option>
          <option value="ratingLow">Rating: Low to High</option>
          <option value="yearNew">Year: Newest</option>
          <option value="yearOld">Year: Oldest</option>
        </select>

        <button id="randomBtn" class="special-btn">Surprise Me!</button>
      </div>
    </section>

    <!--What does container below do?-->
    <section id="container"></section>
  </main>

  <script src="script.js"></script>
</body>

</html>
